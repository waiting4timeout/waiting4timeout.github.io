<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0b1430"/>
      <stop offset="100%" stop-color="#05060f"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#glow)" fill="#6cf">
    <!-- Classic invader pixel sprite, centered. -->
    <g transform="translate(116,150) scale(28)">
      <rect x="2" y="0" width="1" height="1"/>
      <rect x="7" y="0" width="1" height="1"/>
      <rect x="3" y="1" width="1" height="1"/>
      <rect x="6" y="1" width="1" height="1"/>
      <rect x="2" y="2" width="6" height="1"/>
      <rect x="1" y="3" width="2" height="1"/>
      <rect x="4" y="3" width="2" height="1"/>
      <rect x="7" y="3" width="2" height="1"/>
      <rect x="0" y="4" width="10" height="1"/>
      <rect x="0" y="5" width="1" height="1"/>
      <rect x="2" y="5" width="1" height="1"/>
      <rect x="7" y="5" width="1" height="1"/>
      <rect x="9" y="5" width="1" height="1"/>
      <rect x="1" y="6" width="2" height="1"/>
      <rect x="7" y="6" width="2" height="1"/>
    </g>
  </g>
</svg>
